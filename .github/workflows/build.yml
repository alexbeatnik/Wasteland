name: Build and Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-20.04, macos-13, macos-14, windows-latest]
        include:
          - os: ubuntu-20.04
            artifact_name: Wasteland-linux.tar.gz
            target_os: linux
          - os: macos-13
            artifact_name: Wasteland-macos-intel.dmg
            target_os: macos
          - os: macos-14
            artifact_name: Wasteland-macos-arm64.dmg
            target_os: macos
          - os: windows-latest
            artifact_name: Wasteland-windows.zip
            target_os: windows

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies (Linux)
      if: matrix.target_os == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake libsdl2-dev libcurl4-openssl-dev libseccomp-dev

    - name: Install Dependencies (macOS)
      if: matrix.target_os == 'macos'
      run: |
        brew install cmake sdl2 curl pkg-config

    - name: Install Dependencies (Windows)
      if: matrix.target_os == 'windows'
      run: |
        vcpkg install sdl2:x64-windows curl:x64-windows

    - name: Configure CMake (Linux)
      if: matrix.target_os == 'linux'
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Configure CMake (macOS)
      if: matrix.target_os == 'macos'
      run: |
        # Homebrew installs to /opt/homebrew on Apple Silicon and /usr/local on
        # Intel; point CMake at the right prefix so find_package(SDL2)/CURL
        # picks up the bottle-shipped Config files.
        BREW_PREFIX="$(brew --prefix)"
        cmake -B build -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH="$(brew --prefix sdl2);$(brew --prefix curl);${BREW_PREFIX}"

    - name: Configure CMake (Windows)
      if: matrix.target_os == 'windows'
      run: cmake -B build -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake

    - name: Build
      run: cmake --build build --config Release -j 4

    - name: Package (Linux)
      if: matrix.target_os == 'linux'
      run: |
        cd build
        tar -czvf ${{ matrix.artifact_name }} Wasteland

    - name: Package (macOS)
      if: matrix.target_os == 'macos'
      run: |
        cd build
        mkdir dmg_folder
        cp Wasteland dmg_folder/
        hdiutil create -volname "Wasteland" -srcfolder dmg_folder -ov -format UDZO ${{ matrix.artifact_name }}

    - name: Package (Windows)
      if: matrix.target_os == 'windows'
      run: |
        cd build/Release
        Compress-Archive -Path Wasteland.exe -DestinationPath ../${{ matrix.artifact_name }}

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          build/${{ matrix.artifact_name }}
          
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          build/${{ matrix.artifact_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

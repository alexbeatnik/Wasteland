name: Build and Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to create and release (e.g. v0.4)'
        required: true
        type: string

jobs:
  extract-version:
    name: Extract Version
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - id: version
        run: |
          VER=$(grep '#define WASTELAND_VERSION' src/ui.h | sed 's/.*"\(.*\)".*/\1/')
          echo "version=v${VER}" >> $GITHUB_OUTPUT

  create-tag:
    name: Create Tag
    needs: [ extract-version ]
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.extract-version.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        run: |
          TAG="${{ github.event.inputs.version || needs.extract-version.outputs.version }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists on remote, skipping."
            exit 0
          fi
          echo "Creating tag: $TAG"
          git tag "$TAG"
          git push origin "$TAG"

  test:
    name: Run Unit Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libsdl2-dev libcurl4-openssl-dev libseccomp-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DGGML_NATIVE=OFF

      - name: Build Tests
        run: cmake --build build --config Release -j 4

      - name: Run Tests
        run: ctest --output-on-failure --test-dir build

  build:
    name: Build on ${{ matrix.os }}
    needs: [ test, create-tag ]
    if: |
      always() &&
      needs.test.result == 'success' &&
      (github.event_name == 'push' ||
       github.event_name == 'pull_request' ||
       github.event_name == 'workflow_dispatch')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-22.04-arm, macos-14, windows-latest]
        include:
          - os: ubuntu-22.04
            file_name: wasteland_0.4_amd64.deb
            artifact_name: wasteland-linux-amd64-deb
            target_os: linux
          - os: ubuntu-22.04-arm
            file_name: wasteland_0.4_arm64.deb
            artifact_name: wasteland-linux-arm64-deb
            target_os: linux
          - os: macos-14
            file_name: Wasteland-macos.dmg
            artifact_name: Wasteland-macos
            target_os: macos
          - os: windows-latest
            file_name: Wasteland-windows.exe
            artifact_name: Wasteland-windows
            target_os: windows

    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive

    - name: Install Dependencies (Linux)
      if: matrix.target_os == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake libsdl2-dev libcurl4-openssl-dev libseccomp-dev

    - name: Install Dependencies (macOS)
      if: matrix.target_os == 'macos'
      run: |
        brew install cmake pkg-config

    - name: Build universal SDL2 from source (macOS)
      if: matrix.target_os == 'macos'
      run: |
        SDL2_VERSION=2.30.7
        SDL2_PREFIX="$HOME/sdl2-universal"
        curl -L "https://github.com/libsdl-org/SDL/releases/download/release-${SDL2_VERSION}/SDL2-${SDL2_VERSION}.tar.gz" \
          -o /tmp/sdl2.tar.gz
        tar -xzf /tmp/sdl2.tar.gz -C /tmp
        cmake -S "/tmp/SDL2-${SDL2_VERSION}" -B /tmp/sdl2-build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
          -DSDL_STATIC=ON -DSDL_SHARED=OFF \
          -DSDL_TEST=OFF \
          -DCMAKE_INSTALL_PREFIX="${SDL2_PREFIX}"
        cmake --build /tmp/sdl2-build --config Release -j 4
        cmake --install /tmp/sdl2-build
        echo "SDL2_PREFIX=${SDL2_PREFIX}" >> $GITHUB_ENV

    - name: Install Dependencies (Windows)
      if: matrix.target_os == 'windows'
      run: |
        vcpkg install sdl2:x64-windows-static curl:x64-windows-static pthreads:x64-windows-static

    - name: Configure CMake (Linux amd64)
      if: matrix.os == 'ubuntu-22.04'
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DGGML_NATIVE=OFF

    - name: Configure CMake (Linux arm64)
      if: matrix.os == 'ubuntu-22.04-arm'
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DGGML_NATIVE=OFF -DGGML_CPU_ARM_ARCH=armv8-a

    - name: Configure CMake (macOS)
      if: matrix.target_os == 'macos'
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
          -DCMAKE_PREFIX_PATH="${SDL2_PREFIX}"

    - name: Configure CMake (Windows)
      if: matrix.target_os == 'windows'
      run: |
        cmake -B build `
          -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
          -DVCPKG_TARGET_TRIPLET=x64-windows-static `
          -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
          -DBUILD_SHARED_LIBS=OFF

    - name: Build
      run: cmake --build build --config Release -j 4

    - name: Package (Linux)
      if: matrix.target_os == 'linux'
      run: |
        cd build
        cpack -G DEB
        ls -la *.deb

    - name: Package (macOS)
      if: matrix.target_os == 'macos'
      run: |
        cd build
        mkdir dmg_root
        cp -R Wasteland.app dmg_root/
        ln -s /Applications dmg_root/Applications
        hdiutil create -volname "Wasteland" -srcfolder dmg_root -ov -format UDZO ${{ matrix.file_name }}

    - name: Package (Windows)
      if: matrix.target_os == 'windows'
      run: |
        Copy-Item build/Release/Wasteland.exe build/${{ matrix.file_name }}

    - name: Upload Artifacts
      uses: actions/upload-artifact@v5
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          build/${{ matrix.file_name }}

  release:
    name: Create Release
    needs: build
    if: |
      always() &&
      needs.build.result == 'success' &&
      (startsWith(github.ref, 'refs/tags/') ||
       github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: false
          prerelease: false
          tag_name: ${{ github.event.inputs.version || needs.extract-version.outputs.version || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

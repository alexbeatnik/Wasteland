name: Build and Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel sibling jobs if one platform fails — we still want the
      # other artifacts uploaded so a partial release can be inspected.
      fail-fast: false
      matrix:
        # ubuntu-20.04 was removed from GitHub-hosted runners in April 2025;
        # macos-13 (last Intel runner) is in its retirement window. Stick to
        # the current LTS-style images.
        os: [ubuntu-22.04, macos-13, macos-14, windows-latest]
        include:
          - os: ubuntu-22.04
            artifact_name: wasteland_0.1.0_amd64.deb
            target_os: linux
          - os: macos-13
            artifact_name: Wasteland-macos-intel.dmg
            target_os: macos
          - os: macos-14
            artifact_name: Wasteland-macos-arm64.dmg
            target_os: macos
          - os: windows-latest
            artifact_name: Wasteland-windows.exe
            target_os: windows

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies (Linux)
      if: matrix.target_os == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake libsdl2-dev libcurl4-openssl-dev libseccomp-dev

    - name: Install Dependencies (macOS)
      if: matrix.target_os == 'macos'
      run: |
        brew install cmake sdl2 curl pkg-config

    - name: Install Dependencies (Windows)
      if: matrix.target_os == 'windows'
      run: |
        # Static triplet so the resulting Wasteland.exe is a single
        # self-contained binary with SDL2, libcurl, and pthreads-win32
        # linked in — no SDL2.dll / libcurl.dll / pthread.dll need to ship
        # alongside it. pthreads4w (vcpkg name: pthreads) provides the
        # POSIX threading API on MSVC, where pthread.h doesn't exist.
        vcpkg install sdl2:x64-windows-static curl:x64-windows-static pthreads:x64-windows-static

    - name: Configure CMake (Linux)
      if: matrix.target_os == 'linux'
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Configure CMake (macOS)
      if: matrix.target_os == 'macos'
      run: |
        # Homebrew installs to /opt/homebrew on Apple Silicon and /usr/local on
        # Intel; point CMake at the right prefix so find_package(SDL2)/CURL
        # picks up the bottle-shipped Config files.
        BREW_PREFIX="$(brew --prefix)"
        cmake -B build -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH="$(brew --prefix sdl2);$(brew --prefix curl);${BREW_PREFIX}"

    - name: Configure CMake (Windows)
      if: matrix.target_os == 'windows'
      run: |
        cmake -B build `
          -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
          -DVCPKG_TARGET_TRIPLET=x64-windows-static `
          -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
          -DBUILD_SHARED_LIBS=OFF

    - name: Build
      run: cmake --build build --config Release -j 4

    - name: Package (Linux)
      if: matrix.target_os == 'linux'
      run: |
        cd build
        cpack -G DEB
        ls -la *.deb

    - name: Package (macOS)
      if: matrix.target_os == 'macos'
      run: |
        # CMake's MACOSX_BUNDLE produces build/Wasteland.app — a directory
        # containing Contents/MacOS/Wasteland and Contents/Resources/icon.icns.
        # Drop it into a staging dir + a /Applications symlink for the classic
        # drag-to-install DMG layout, then compress.
        cd build
        mkdir dmg_root
        cp -R Wasteland.app dmg_root/
        ln -s /Applications dmg_root/Applications
        hdiutil create -volname "Wasteland" -srcfolder dmg_root -ov -format UDZO ${{ matrix.artifact_name }}

    - name: Package (Windows)
      if: matrix.target_os == 'windows'
      run: |
        # Hand the binary to the upload step at the same path the other
        # platforms use: build/<artifact_name>. With static linkage the
        # resulting .exe is the entire deliverable — no DLLs needed.
        Copy-Item build/Release/Wasteland.exe build/${{ matrix.artifact_name }}

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          build/${{ matrix.artifact_name }}
          
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          build/${{ matrix.artifact_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

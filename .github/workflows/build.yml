name: Build and Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Serialise runs per ref so a PR-close and the resulting push-to-main don't
# race two concurrent build matrices into the same immutable v5 artifact name
# (the second uploader would get a 409 Conflict). Tag pushes get their own
# group so a release run is never cancelled by a branch run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to create and release (e.g. v0.5)'
        required: true
        type: string

jobs:
  extract-version:
    name: Extract Version
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_exists: ${{ steps.version.outputs.tag_exists }}
    steps:
      - uses: actions/checkout@v5
      - id: version
        run: |
          VER=$(grep '#define WASTELAND_VERSION' src/ui.h | sed 's/.*"\(.*\)".*/\1/')
          TAG="v${VER}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          # Probe whether the tag is already on the remote. If yes, this push
          # is just a cosmetic update (README tweak, doc fix, etc.) — we must
          # NOT recreate the release, otherwise the freshly-built artefacts
          # would overwrite the published ones and any hand-edited release
          # notes would be lost. Release job uses this flag to gate itself.
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists on remote — release will be skipped."
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} is new — release will be created."
          fi

  create-tag:
    name: Create Tag
    needs: [ extract-version ]
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.extract-version.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        run: |
          TAG="${{ github.event.inputs.version || needs.extract-version.outputs.version }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists on remote, skipping."
            exit 0
          fi
          echo "Creating tag: $TAG"
          git tag "$TAG"
          git push origin "$TAG"

  test:
    name: Run Unit Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libsdl2-dev libcurl4-openssl-dev libseccomp-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DGGML_NATIVE=OFF

      - name: Build Tests
        run: cmake --build build --config Release -j 4

      - name: Run Tests
        run: ctest --output-on-failure --test-dir build

  build:
    name: Build on ${{ matrix.os }}
    needs: [ test, create-tag ]
    if: |
      always() &&
      needs.test.result == 'success' &&
      (github.event_name == 'push' ||
       github.event_name == 'pull_request' ||
       github.event_name == 'workflow_dispatch')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-22.04-arm, macos-14, windows-latest]
        include:
          - os: ubuntu-22.04
            artifact_name: wasteland-linux-amd64-deb
            target_os: linux
          - os: ubuntu-22.04-arm
            artifact_name: wasteland-linux-arm64-deb
            target_os: linux
          - os: macos-14
            file_name: Wasteland-macos.dmg
            artifact_name: Wasteland-macos
            target_os: macos
          - os: windows-latest
            file_name: Wasteland-windows.exe
            artifact_name: Wasteland-windows
            target_os: windows

    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive

    - name: Install Dependencies (Linux)
      if: matrix.target_os == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake libsdl2-dev libcurl4-openssl-dev libseccomp-dev

    - name: Install Dependencies (macOS)
      if: matrix.target_os == 'macos'
      run: |
        brew install cmake pkg-config

    - name: Build universal SDL2 from source (macOS)
      if: matrix.target_os == 'macos'
      run: |
        SDL2_VERSION=2.30.7
        SDL2_PREFIX="$HOME/sdl2-universal"
        curl -L "https://github.com/libsdl-org/SDL/releases/download/release-${SDL2_VERSION}/SDL2-${SDL2_VERSION}.tar.gz" \
          -o /tmp/sdl2.tar.gz
        tar -xzf /tmp/sdl2.tar.gz -C /tmp
        cmake -S "/tmp/SDL2-${SDL2_VERSION}" -B /tmp/sdl2-build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
          -DSDL_STATIC=ON -DSDL_SHARED=OFF \
          -DSDL_TEST=OFF \
          -DCMAKE_INSTALL_PREFIX="${SDL2_PREFIX}"
        cmake --build /tmp/sdl2-build --config Release -j 4
        cmake --install /tmp/sdl2-build
        echo "SDL2_PREFIX=${SDL2_PREFIX}" >> $GITHUB_ENV

    - name: Install Dependencies (Windows)
      if: matrix.target_os == 'windows'
      run: |
        vcpkg install sdl2:x64-windows-static curl:x64-windows-static pthreads:x64-windows-static

    - name: Configure CMake (Linux amd64)
      if: matrix.os == 'ubuntu-22.04'
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DGGML_NATIVE=OFF

    - name: Configure CMake (Linux arm64)
      if: matrix.os == 'ubuntu-22.04-arm'
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DGGML_NATIVE=OFF -DGGML_CPU_ARM_ARCH=armv8-a

    - name: Configure CMake (macOS)
      if: matrix.target_os == 'macos'
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
          -DCMAKE_PREFIX_PATH="${SDL2_PREFIX}"

    - name: Configure CMake (Windows)
      if: matrix.target_os == 'windows'
      run: |
        cmake -B build `
          -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
          -DVCPKG_TARGET_TRIPLET=x64-windows-static `
          -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
          -DBUILD_SHARED_LIBS=OFF

    - name: Build
      run: cmake --build build --config Release -j 4

    - name: Package (Linux)
      id: pkg_linux
      if: matrix.target_os == 'linux'
      run: |
        cd build
        cpack -G DEB
        ls -la *.deb
        DEB=$(ls *.deb | head -1)
        echo "file_name=${DEB}" >> "$GITHUB_OUTPUT"

    - name: Package (macOS)
      if: matrix.target_os == 'macos'
      run: |
        cd build
        mkdir dmg_root
        cp -R Wasteland.app dmg_root/
        ln -s /Applications dmg_root/Applications
        hdiutil create -volname "Wasteland" -srcfolder dmg_root -ov -format UDZO ${{ matrix.file_name }}

    - name: Package (Windows)
      if: matrix.target_os == 'windows'
      run: |
        Copy-Item build/Release/Wasteland.exe build/${{ matrix.file_name }}

    - name: Upload Artifacts (Linux)
      if: matrix.target_os == 'linux'
      uses: actions/upload-artifact@v5
      with:
        name: ${{ matrix.artifact_name }}
        path: build/${{ steps.pkg_linux.outputs.file_name }}

    - name: Upload Artifacts (non-Linux)
      if: matrix.target_os != 'linux'
      uses: actions/upload-artifact@v5
      with:
        name: ${{ matrix.artifact_name }}
        path: build/${{ matrix.file_name }}

  release:
    name: Create Release
    # `extract-version` is in `needs` so this job can read its output.
    # Without it, `needs.extract-version.outputs.version` evaluates to null
    # on a `main`-branch push, the `||` fallback drops to `github.ref_name`
    # which IS the literal string `main`, and softprops/action-gh-release
    # then creates both a release AND a git tag named `main` at the current
    # commit — bypassing the `v0.5` tag that `create-tag` just pushed.
    needs: [ build, extract-version ]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (startsWith(github.ref, 'refs/tags/') ||
       github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' && github.ref == 'refs/heads/main' &&
        needs.extract-version.outputs.tag_exists == 'false'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          # Priority order:
          #   1. Manual workflow_dispatch input  → user-supplied (e.g. v0.6)
          #   2. extract-version output         → pulled from src/ui.h on a main push
          #   3. github.ref_name                → only meaningful when ref is already a tag
          # Anything else (notably: `main` from a branch ref) is rejected so
          # we never accidentally create a `main` release/tag.
          INPUT_VER="${{ github.event.inputs.version }}"
          EXTRACT_VER="${{ needs.extract-version.outputs.version }}"
          REF_NAME="${{ github.ref_name }}"
          REF_KIND="${{ github.ref_type }}"

          if [ -n "$INPUT_VER" ]; then
            TAG="$INPUT_VER"
          elif [ -n "$EXTRACT_VER" ]; then
            TAG="$EXTRACT_VER"
          elif [ "$REF_KIND" = "tag" ]; then
            TAG="$REF_NAME"
          else
            echo "::error::No usable version: inputs='$INPUT_VER', extract='$EXTRACT_VER', ref_kind='$REF_KIND', ref_name='$REF_NAME'"
            exit 1
          fi

          # Sanity-check: must look like vX.Y or vX.Y.Z.
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+(\.[0-9]+)?$'; then
            echo "::error::Resolved tag '$TAG' is not a valid version (expected vX.Y or vX.Y.Z)"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release will use tag: $TAG"

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: false
          prerelease: false
          tag_name: ${{ steps.tag.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
